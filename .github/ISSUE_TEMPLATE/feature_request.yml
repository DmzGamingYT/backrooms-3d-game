name: "✨ Feature Request"
description: "Suggérer une nouvelle fonctionnalité, une amélioration ou un outil pour Solis."
title: "[feat] "
labels:
  - "enhancement"
  - "discussion"
body:
  - type: markdown
    attributes:
      value: |
        Décrivez la fonctionnalité que vous aimeriez voir. Un scénario
        motivant est encore mieux — qu'essayiez-vous de faire et comment
        la fonctionnalité vous aiderait-elle ?

  - type: textarea
    id: problem
    attributes:
      label: "Problème à résoudre"
      placeholder: "Quand je demande à Solis de me rappeler quelque chose, il n'a pas de notion de rappel programmé…"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "Solution proposée"
      placeholder: "Comment ça devrait fonctionner ? Nouvel outil, commande vocale, UI, intégration…"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives envisagées"
    validations:
      required: false

  - type: checkboxes
    id: willing
    attributes:
      label: "Disponibilité"
      description: "Optionnel — signal d'intérêt pour une contribution."
      options:
        - label: "Je serais prêt(e) à soumettre une PR si on se met d'accord sur le design"
