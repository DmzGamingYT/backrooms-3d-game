name: "🐛 Bug Report"
description: "Something isn't working as expected in Solis."
title: "[bug] "
labels:
  - "bug"
  - "needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        Merci de signaler un bug ! Plus vous donnez de détails, plus on
        peut reproduire et corriger vite. Captures d'écran / clips bienvenus.

  - type: dropdown
    id: backend
    attributes:
      label: "Backend utilisé"
      description: "Quel fournisseur LLM était actif au moment du bug ?"
      options:
        - "Démo (mock)"
        - "Groq"
        - "OpenRouter"
        - "Ollama (local)"
        - "Non applicable / autre"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: "Mode de saisie"
      options:
        - "Voix (micro + Web Speech)"
        - "Texte (chat clavier)"
        - "Les deux"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: "Que s'est-il passé ?"
      placeholder: "Une ou deux phrases suffisent."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: "Étapes pour reproduire"
      placeholder: |
        1. Lancer npm run dev…
        2. Sélectionner le backend Groq…
        3. Toucher l'orb pour parler…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Comportement attendu"
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: "Navigateur + version"
      placeholder: "Chrome 138, Firefox 130, Safari 18…"
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: "Sortie console (optionnel)"
      placeholder: |
        Collez ici les erreurs de DevTools > Console.
